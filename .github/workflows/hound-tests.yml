name: Hound E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Hound CLI
        run: npm install -g @hound-ai/cli

      - name: Run E2E Tests
        env:
          HOUND_API_URL: ${{ secrets.HOUND_API_URL }}
          HOUND_API_KEY: ${{ secrets.HOUND_API_KEY }}
        run: |
          hound run \
            --project=${{ vars.HOUND_PROJECT_ID }} \
            --reporter=junit \
            > test-results.xml

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml
